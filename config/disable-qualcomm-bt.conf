# Blacklist the UART Bluetooth kernel driver.
# Steam Deck's built-in Broadcom/Qualcomm BT uses this driver.
# USB Bluetooth adapters (TP-Link, ASUS, etc.) use btusb — unaffected.
# Remove this file and reload the module to restore:
#   sudo rm /etc/modprobe.d/disable-qualcomm-bt.conf
#   sudo modprobe hci_uart
blacklist hci_uart
